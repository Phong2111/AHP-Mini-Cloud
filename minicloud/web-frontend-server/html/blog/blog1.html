<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog 1 - Công nghệ Cloud</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #0F2027; --secondary: #203A43; --tertiary: #2C5364; }
        body { margin: 0; font-family: 'Outfit', sans-serif; background: linear-gradient(135deg, var(--primary), var(--secondary), var(--tertiary)); color: white; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px;}
        .glass-panel { max-width: 800px; background: rgba(255, 255, 255, 0.05); padding: 40px; border-radius: 20px; backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 10px 30px rgba(0,0,0,0.5); animation: fadein 1s ease; }
        @keyframes fadein { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .hero-img { width: 100%; border-radius: 12px; margin: 20px 0; object-fit: cover; height: 300px; }
        .back-btn { display: inline-block; margin-top: 20px; padding: 10px 25px; background: rgba(255,255,255,0.1); border-radius: 30px; text-decoration: none; color: white; transition: 0.3s; border: 1px solid rgba(255,255,255,0.2); }
        .back-btn:hover { background: rgba(255,255,255,0.3); transform: scale(1.05); }
    </style>
</head>
<body>
    <div class="glass-panel">
        <h1>Tương lai của Cloud Computing</h1>
        <p>Cloud Computing đang dần trở thành tiêu chuẩn trong phát triển phần mềm, thay thế hoàn toàn những hệ thống máy chủ vật lý cồng kềnh. Giờ đây, bạn có thể triển khai hệ thống toàn cầu chỉ bằng một vài cú click chuột.</p>
        <img src="https://images.unsplash.com/photo-1451187580459-43490279c0fa?q=80&w=2072&auto=format&fit=crop" alt="Cloud Tech" class="hero-img">
        <a href="/" class="back-btn">← Quay lại trang chủ</a>
    </div>
</body>
</html>
